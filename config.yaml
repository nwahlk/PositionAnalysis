# 数据目录（Obsidian vault 中的持仓文件目录）
data_dir: "E:/连坤的知识库/01-Projects 当前进行中的项目/投资建议"
# 报告输出目录（保存到 Obsidian 同目录）
output_dir: "E:/连坤的知识库/01-Projects 当前进行中的项目/投资建议"
# 缓存设置
cache_dir: "./.cache"
cache_max_age_hours: 4
# 无风险利率（用于夏普比率计算）
risk_free_rate: 0.015

# 用户风险画像
risk_profile:
  age: 40
  investment_horizon_years: 10
  risk_tolerance: "moderate"       # conservative / moderate / aggressive
  max_drawdown_tolerance: 0.15

# 基准配置
benchmark:
  equity_index: "sh000300"         # 沪深300
  bond_index: "sh000012"           # 中证全债
  blend_ratio: 0.5                 # 混合基准中权益占比

# 建议阈值（单标的评分）
recommendation:
  high_loss_threshold: -0.20
  moderate_loss_threshold: -0.10
  concentration_threshold: 0.30

# 再平衡推荐标的池（按资产类别分组，系统会自动排除已持有标的）
fund_suggestions:
  fixed_income:
    - code: "003003"
      name: "华夏现金增利货币A"
      reason: "纯债基金，年化波动率低，适合固收底仓"
    - code: "217022"
      name: "招商产业债券A"
      reason: "信用债代表，长期夏普比率 > 1"
    - code: "005683"
      name: "富国中证10年期国债ETF联接A"
      reason: "利率债指数基金，与权益类低相关"
    - code: "001171"
      name: "工银双利债券A"
      reason: "二级债基，攻守兼备"
  alternative:
    - code: "002610"
      name: "博时黄金ETF联接C"
      reason: "黄金是全天候核心对冲资产"
    - code: "501018"
      name: "南方原油LOF"
      reason: "原油商品，通胀对冲"
    - code: "159985"
      name: "豆粕ETF"
      reason: "农产品商品，与股债相关性低"
  cash_like:
    - code: "000198"
      name: "天弘增利宝货币"
      reason: "货币基金，流动性好"
  equity_reduce_hint: "建议优先卖出同类排名后25%且建议'卖出'的标的"

# 高级分析参数
advanced:
  correlation_threshold: 0.80
  rebalance_threshold: 0.05
